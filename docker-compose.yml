services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: encore-postgres
    environment:
      POSTGRES_USER: encore
      POSTGRES_PASSWORD: encore
      POSTGRES_DB: encore_drawings
    ports:
      - "5455:5432"
    volumes:
      - encore_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encore -d encore_drawings"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  encore_pg_data:
